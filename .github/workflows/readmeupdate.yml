name: Generate README.md File

on:
  workflow_dispatch:
  schedule:
    - cron: '9 */8 * * *'

jobs:
  build:

    runs-on: ubuntu-slim
    strategy:
      matrix:
        python-version: ['3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
      - name: Generate README
        run: |
          python generate.py

      - name: Commit and open PR
        env:
          GH_TOKEN: ${{ secrets.MY_TOKEN }}
        run: |
          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"

          # bail out early if nothing changed
          if git diff --quiet; then
            echo "No changes to README, skipping."
            exit 0
          fi

          # nuke any leftover branch from a previous failed/unmerged run
          git push https://${{ secrets.GITHUB_TOKEN }}@github.com/${GITHUB_REPOSITORY}.git --delete update || true

          git checkout -b update
          git add .
          git commit -m "feat: update README"
          git push -f -u https://${{ secrets.GITHUB_TOKEN }}@github.com/${GITHUB_REPOSITORY}.git update

          gh pr create --head update --fill
          gh pr review --comment -b "amogus"
          gh pr review --comment -b "sussy baka"
          gh pr merge -d -m
